name: calpipe
channels:
  - conda-forge
dependencies:
  - python=3.11
  # Numerical core (numpy 2.x has known breakage with caiman/numba)
  - numpy>=1.26,<2
  - scipy>=1.11,<2
  # Image / signal processing
  - scikit-image>=0.22
  - scikit-learn>=1.2
  - opencv>=4.8
  # Plotting
  - matplotlib>=3.8,<4
  # I/O
  - tifffile>=2023.4
  - pyyaml>=6.0
  - pillow>=10.0
  # Data analysis
  - pandas>=2.1,<3
  - statsmodels>=0.14
  # Parallelism
  - joblib>=1.2
  # Calcium imaging — conda-forge only.  The PyPI package called "caiman"
  # is something completely different (a MicroPython build tool); never
  # `pip install caiman`.
  - caiman>=1.11,<2
  # pip-only deps
  - pip
  - pip:
      - nd2>=0.10
