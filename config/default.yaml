# =============================================================================
# Calcium Pipeline — Default Configuration
# =============================================================================
#
# Single source of truth for all pipeline parameters.
#
# Usage:
#   # Pipeline reads this automatically via run.sh:
#   bash run.sh single --movie /path/to/file.nd2
#
#   # Or override individual values with CLI flags:
#   bash run.sh single --movie ... --frame-rate 30 --indicator gcamp6f
#
#   # Or point at a different config file:
#   bash run.sh single --movie ... --config my_config.yaml
#
# Defaults here match the values used in production for organoid
# Fluo-4 imaging at 2 Hz.  Override per-dataset by copying this file and
# editing the values you need.
# =============================================================================


# ── Imaging ──────────────────────────────────────────────────────────────
# Acquisition parameters describing the input data.
imaging:
  frame_rate: 2.0             # Hz
  pixel_size_um: 2.0          # metadata — not used by processing
  indicator: fluo4            # see config_loader.INDICATOR_DECAY_TIMES for options
  fov_size_um: [512, 512]     # metadata — not used by processing

# Optional override for the decay time used by OASIS deconvolution.
# Leave unset (null) to auto-resolve from the indicator name.
decay_time: null


# ── Motion Correction (CaImAn NoRMCorre) ─────────────────────────────────
motion:
  enabled: true
  mode: rigid                 # rigid | piecewise_rigid | auto
  max_shift: 20               # px
  # Advanced — CaImAn defaults, rarely tuned
  pw_strides: [96, 96]
  pw_overlaps: [48, 48]
  niter_rig: 2
  num_frames_split: 100


# ── Detection (Seed + Contour) ───────────────────────────────────────────
detection:
  # Expected neuron radius.  These get overridden if auto_radius.enabled.
  min_radius: 10.0            # px
  max_radius: 25.0            # px

  # Blob detection thresholds
  intensity_threshold: 0.18   # max-projection blob threshold
  correlation_threshold: 0.12 # correlation-projection blob threshold
  max_seeds: 500
  smooth_sigma: 4.0           # Gaussian sigma for hotspot suppression
  border_margin: 20           # exclude seeds within this many px of FOV edge

  # Contour extraction
  contour_method: otsu        # otsu | triangle
  contour_fallback: true      # generate circular footprint when Otsu fails
  fallback_method: gaussian   # gaussian | disk — shape of fallback footprint

  # Projection selection (which images to run blob detection on)
  use_temporal_projection: true
  n_peak_frames: 10
  peak_percentile: 90.0
  use_mean_proj: true
  use_std_proj: true

  # Auto-radius optimisation: sweep candidate radii and pick the one
  # that produces the most high-SNR traces.  Overrides min/max_radius above.
  auto_radius:
    enabled: true
    snr_threshold: 5.0        # min trace SNR for "good" neuron
    n_candidates: 5           # number of radius settings to sweep
    radius_min: 3.0           # sweep lower bound
    radius_max: 35.0          # sweep upper bound


# ── Baseline Correction (ΔF/F₀) ──────────────────────────────────────────
# Method selection:
#   direct           — pass raw traces to OASIS (no ΔF/F conversion)
#   global_dff       — per-trace rolling percentile ΔF/F₀ (default)
#   local_dff        — currently identical to global_dff
#   local_background — tissue-masked annulus around each ROI (for organoids)
baseline:
  method: global_dff
  edge_trim: false            # detect & trim boundary artefacts

  # Rolling-percentile baseline (used by all ΔF/F methods)
  percentile: 8.0
  window_fraction: 0.25       # as fraction of T
  min_window: 50              # frames
  max_window: 500             # frames

  # Only used when method == local_background
  annulus_inner_gap: 2        # px between ROI boundary and annulus start
  annulus_outer_radius: 20    # px outer radius of annulus
  tissue_threshold_method: otsu  # otsu | percentile
  min_annulus_pixels: 50      # expand annulus if fewer tissue pixels available


# ── Deconvolution (OASIS) ────────────────────────────────────────────────
deconvolution:
  enabled: true
  method: oasis               # oasis | threshold
  s_min: 0.1                  # min spike amplitude in ΔF/F₀
  noise_gate: 3.5             # σ — spikes below this are zeroed

  # OASIS internals — safe defaults, rarely tuned
  penalty: 0.0                # L1 sparsity; 0 = auto-tune
  optimize_g: true
  noise_method: mean

  # Optional pre-deconvolution low-pass filter
  temporal_filter: false
  filter_cutoff: 2.0          # Hz


# ── Output & Visualisation ───────────────────────────────────────────────
output:
  gallery: false              # interactive HTML inspection gallery


# ── Quality Thresholds (Group Analysis) ──────────────────────────────────
quality:
  drift_threshold: 1.0        # max residual baseline drift ratio
  motion_max_threshold: 15.0  # exclude datasets with max shift above this (px)
  motion_residual_threshold: 2.0  # exclude datasets with residual jitter above this (px)
  min_roi_distance: 15.0      # px — deduplicate ROIs closer than this
  inactive_file: null         # path to file listing manually confirmed inactive datasets
  # Genotype classification: maps the line-prefix (digit before the hyphen
  # in the second underscore-delimited field of the dataset name) to a
  # genotype label.  Prefixes not listed fall through to 'default'.
  # Adapt this to your naming convention.
  genotype_map:
    '3': Control
    default: Mutant
  mutant_label: Mutant    # display label for mutant group in figures
  roi_peak_figures: false      # per-ROI peak frame PNGs (slow, off by default)


# ── Development / Experimental ───────────────────────────────────────────
dev:
  network_analysis: false     # spectral/PCA network analysis
